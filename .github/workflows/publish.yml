name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without actually publishing'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: |
          npm --version
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: node scripts/check-vulnerabilities.js

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test:coverage

      - name: Check coverage threshold
        run: node scripts/check-coverage.js

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm (dry run)
        if: inputs.dry-run == true
        run: npm publish --dry-run

      - name: Publish to npm
        if: inputs.dry-run != true
        run: npm publish --access public

      - name: Resolve release version
        if: inputs.dry-run != true && github.event.release.tag_name != ''
        id: version
        run: |
          # Strip leading 'v' from tag (e.g., v1.8.3 -> 1.8.3) — site repo expects plain semver
          TAG="${{ github.event.release.tag_name }}"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Notify site repo to auto-update
        if: steps.version.outputs.semver != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_REPO_PAT }}
          repository: lwndev/ai-skills-manager-site
          event-type: cli-release
          client-payload: '{"version": "${{ steps.version.outputs.semver }}"}'
